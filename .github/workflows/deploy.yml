name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ubuntu

            if [ ! -d "Dairy-Farm-Shop-Management-System" ]; then
              git clone https://github.com/JatinDuttt/Dairy-Farm-Shop-Management-System.git
            fi

            cd Dairy-Farm-Shop-Management-System
            git pull origin main

            # Copy ALL files (important)
            sudo cp -r * /var/www/html/

            # Reload nginx (faster than restart)
            sudo systemctl reload nginx
