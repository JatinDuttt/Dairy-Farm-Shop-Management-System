name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd /home/ubuntu

            if [ ! -d "Dairy-Farm-Shop-Management-System" ]; then
              git clone https://github.com/JatinDuttt/Dairy-Farm-Shop-Management-System.git
            fi

            cd Dairy-Farm-Shop-Management-System
            git pull origin main

            sudo cp index.html style.css script.js /var/www/html/
            sudo systemctl restart nginx