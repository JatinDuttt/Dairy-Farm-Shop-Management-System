services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dfsms-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: dfsms_user
      DB_PASS: dfsms_password
      DB_NAME: dfsms
      APP_ENV: production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: dfsms-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dfsms
      MYSQL_USER: dfsms_user
      MYSQL_PASSWORD: dfsms_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - dfsms-db-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  dfsms-db-data:
